<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Legalisir POLTERA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
    .hide { display: none !important; }
  </style>
  <script>tailwind.config = { theme: { extend: { colors: { 'poltera-navy': '#1e3a8a', 'poltera-accent': '#f59e0b', 'poltera-dark': '#0f172a' } } } }</script>
</head>
<body class="text-slate-800">

  <!-- HALAMAN LOGIN -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center relative overflow-hidden bg-gradient-to-br from-poltera-dark via-slate-800 to-poltera-navy p-4 z-50">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
      <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-poltera-navy tracking-tight uppercase">E-LEGALISIR</h1>
        <p class="text-xs font-semibold text-slate-400 mt-1 uppercase tracking-wider">Politeknik Negeri Madura</p>
      </div>

      <div id="role-selection-section" class="space-y-3.5">
        <button onclick="bukaFormKredensial('Alumni')" class="w-full flex items-center gap-3.5 p-4 bg-slate-50 hover:bg-blue-50 border border-slate-200 rounded-xl text-left transition">
          <div class="w-10 h-10 rounded-lg bg-blue-100 text-poltera-navy flex items-center justify-center text-lg"><i class="fas fa-user-graduate"></i></div>
          <div><p class="font-bold text-sm">Alumni</p><p class="text-[10px] text-slate-400">Login dengan NIM</p></div>
        </button>
        <button onclick="bukaFormKredensial('Admin')" class="w-full flex items-center gap-3.5 p-4 bg-slate-50 hover:bg-emerald-50 border border-slate-200 rounded-xl text-left transition">
          <div class="w-10 h-10 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center text-lg"><i class="fas fa-user-shield"></i></div>
          <div><p class="font-bold text-sm">Admin Portal</p><p class="text-[10px] text-slate-400">BAAK & Keuangan</p></div>
        </button>
      </div>

      <div id="credential-form-section" class="hide space-y-4 text-left border p-5 rounded-2xl bg-slate-50">
        <div class="flex items-center gap-2 mb-2">
          <button type="button" onclick="kembaliKePilihanRole()" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
          <span class="text-xs font-bold text-slate-500 uppercase tracking-widest" id="label-username">Login</span>
        </div>
        <form onsubmit="prosesLogin(event)">
          <input type="text" id="auth-username" required placeholder="Masukkan ID..." class="w-full px-4 py-3 border rounded-lg text-sm outline-none mb-3">
          <input type="password" id="auth-password" placeholder="Password Admin..." class="w-full px-4 py-3 border rounded-lg text-sm outline-none mb-4 hide">
          <button type="submit" id="btnLogin" class="w-full bg-poltera-navy text-white text-xs font-bold py-3.5 rounded-xl">Masuk</button>
        </form>
      </div>
    </div>
  </div>

  <!-- APLIKASI UTAMA -->
  <div id="app-screen" class="hide flex h-screen overflow-hidden relative">
    
    <!-- FIX: Overlay untuk HP otomatis tutup sidebar -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/60 z-40 hidden md:hidden transition-opacity opacity-0 backdrop-blur-sm"></div>

    <!-- FIX: Sidebar Class disesuaikan untuk Responsif -->
    <aside id="main-sidebar" class="w-64 bg-poltera-dark text-slate-200 flex flex-col z-50 shadow-2xl h-full border-r border-slate-800 absolute md:relative inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
      <button onclick="toggleSidebar()" class="md:hidden absolute top-4 right-4 text-slate-400 hover:text-white w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center"><i class="fas fa-times"></i></button>
      
      <div class="h-16 flex items-center justify-center border-b border-slate-800 bg-slate-900/50"><span class="font-extrabold text-white tracking-widest uppercase">E-LEGALISIR</span></div>
      <div class="p-4 border-b border-slate-800 bg-slate-950/40 flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-poltera-accent text-white flex items-center justify-center font-bold" id="nav-initial">U</div>
        <div class="overflow-hidden">
          <p class="text-xs font-bold text-white truncate" id="nav-user-name">User Name</p>
          <p class="text-[9px] text-slate-400 uppercase font-semibold" id="nav-user-role">Role</p>
        </div>
      </div>
      <nav class="flex-1 p-4 space-y-2 overflow-y-auto" id="nav-menu"></nav>
      <div class="p-4 border-t border-slate-800">
        <button onclick="window.location.reload()" class="w-full py-2.5 bg-red-600/10 text-red-400 rounded-xl text-xs font-bold hover:bg-red-600 hover:text-white transition">Keluar</button>
      </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full relative bg-slate-50">
      <header class="bg-white border-b px-4 md:px-6 py-4 flex items-center gap-4 shadow-sm z-10">
        <!-- FIX: Tombol Hamburger Menu -->
        <button onclick="toggleSidebar()" class="md:hidden text-slate-500 hover:text-poltera-navy w-10 h-10 rounded-xl bg-slate-50 border flex items-center justify-center"><i class="fas fa-bars"></i></button>
        <h3 class="text-lg font-bold text-slate-800" id="header-title">Dashboard</h3>
      </header>
      <div class="flex-1 overflow-y-auto p-4 md:p-6" id="view-wrapper"></div>
    </main>
  </div>

  <template id="view-dashboard">
    <div class="space-y-6">
      <div id="profil-alumni" class="bg-white border p-5 rounded-2xl shadow-sm flex flex-col md:flex-row gap-6 items-center hide">
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl"><i class="fas fa-graduation-cap"></i></div>
        <div class="flex-1 w-full grid grid-cols-2 md:grid-cols-4 gap-4 text-sm text-center md:text-left">
          <div><p class="text-slate-400 text-[10px] uppercase font-bold">NIM</p><p class="font-bold" id="lbl-nim"></p></div>
          <div><p class="text-slate-400 text-[10px] uppercase font-bold">Nama Lengkap</p><p class="font-bold truncate" id="lbl-nama"></p></div>
          <div><p class="text-slate-400 text-[10px] uppercase font-bold">Jurusan/Prodi</p><p class="font-bold truncate" id="lbl-prodi"></p></div>
          <div><p class="text-slate-400 text-[10px] uppercase font-bold">Tahun Lulus</p><p class="font-bold" id="lbl-tahun"></p></div>
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col items-center text-center">
          <div class="w-10 h-10 mb-2 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fas fa-file-alt"></i></div>
          <p class="text-[10px] font-bold text-slate-400">Total Pengajuan</p><p class="text-2xl font-bold" id="stat-total">0</p>
        </div>
        <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col items-center text-center">
          <div class="w-10 h-10 mb-2 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center"><i class="fas fa-clock"></i></div>
          <p class="text-[10px] font-bold text-slate-400">Menunggu</p><p class="text-2xl font-bold" id="stat-pending">0</p>
        </div>
        <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col items-center text-center">
          <div class="w-10 h-10 mb-2 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center"><i class="fas fa-check"></i></div>
          <p class="text-[10px] font-bold text-slate-400">Selesai</p><p class="text-2xl font-bold" id="stat-done">0</p>
        </div>
        <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col items-center text-center">
          <div class="w-10 h-10 mb-2 rounded-full bg-rose-50 text-rose-600 flex items-center justify-center"><i class="fas fa-times"></i></div>
          <p class="text-[10px] font-bold text-slate-400">Ditolak</p><p class="text-2xl font-bold" id="stat-rejected">0</p>
        </div>
      </div>
    </div>
  </template>

  <template id="view-pengajuan">
    <div class="bg-white rounded-2xl border p-5 md:p-6 shadow-sm max-w-3xl">
      <form onsubmit="submitForm(event)" class="space-y-5">
        <h3 class="font-bold text-poltera-navy border-b pb-2 text-sm md:text-base">1. Upload Dokumen (Max 1MB)</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Upload Ijazah</label><input type="file" id="fileIjazah" accept="image/png, image/jpeg" class="w-full border p-2 text-xs rounded-xl" onchange="checkSize(this)"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Jumlah Ijazah</label><input type="number" id="jmlIjazah" value="0" min="0" class="w-full border rounded-xl p-2 text-sm outline-none focus:ring-1" onchange="hitungTotal()"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Upload Transkrip</label><input type="file" id="fileTranskrip" accept="image/png, image/jpeg" class="w-full border p-2 text-xs rounded-xl" onchange="checkSize(this)"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Jumlah Transkrip</label><input type="number" id="jmlTranskrip" value="0" min="0" class="w-full border rounded-xl p-2 text-sm outline-none focus:ring-1" onchange="hitungTotal()"></div>
        </div>

        <h3 class="font-bold text-poltera-navy border-b pb-2 mt-6 text-sm md:text-base">2. Pembayaran</h3>
        <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200 text-center md:text-left">
          <p class="text-xs text-gray-600">Total Tagihan:</p><p class="text-2xl font-bold text-rose-600" id="lblTotal">Rp 0</p>
          <p class="text-xs font-bold mt-2">Transfer ke: <span id="lblBank" class="text-blue-800 block md:inline mt-1 md:mt-0"></span></p>
        </div>
        <div><label class="block text-xs font-bold text-slate-500 mb-1">Upload Bukti Bayar *</label><input type="file" id="fileBukti" accept="image/png, image/jpeg" required class="w-full border p-2 text-xs rounded-xl" onchange="checkSize(this)"></div>

        <h3 class="font-bold text-poltera-navy border-b pb-2 mt-6 text-sm md:text-base">3. Kontak & Pengiriman</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label class="block text-xs font-bold text-slate-500 mb-1">No. WhatsApp Aktif *</label><input type="text" id="noHp" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="08..." class="w-full border rounded-xl p-2 text-sm outline-none focus:ring-1"></div>
          <div><label class="block text-xs font-bold text-slate-500 mb-1">Metode Pengambilan *</label>
            <select id="metode" onchange="toggleAlamat()" class="w-full border rounded-xl p-2 text-sm bg-white outline-none focus:ring-1">
              <option value="Ambil di POLTERA">Ambil di POLTERA</option><option value="Ekspedisi COD">Dikirim (Ekspedisi COD)</option>
            </select>
          </div>
        </div>
        <div id="alamat-container" class="hide"><label class="block text-xs font-bold text-slate-500 mb-1 mt-3">Alamat Lengkap *</label><textarea id="alamat" rows="2" class="w-full border rounded-xl p-2 text-sm outline-none focus:ring-1" placeholder="RT/RW, Desa, Kecamatan, Kodepos..."></textarea></div>
        
        <div class="border-t pt-4 mt-6"><button type="submit" id="btnSubmit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold text-sm w-full transition"><i class="fas fa-paper-plane mr-2"></i> Kirim Pengajuan</button></div>
      </form>
    </div>
  </template>

  <template id="view-tabel">
    <div class="bg-white rounded-2xl border shadow-sm overflow-hidden flex flex-col">
      <div class="p-4 border-b bg-slate-50"><h4 class="font-bold text-sm md:text-base">Daftar Data</h4></div>
      <div class="overflow-x-auto w-full">
        <table class="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
          <thead><tr class="bg-slate-100 text-slate-500 text-xs uppercase"><th class="p-4">Tanggal / Pemohon</th><th class="p-4">Berkas</th><th class="p-4 text-center">Status</th><th class="p-4 text-center">Aksi</th></tr></thead>
          <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- MODAL TOLAK -->
  <div id="modalTolak" class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center hide p-4">
    <div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl p-5">
        <h4 class="font-bold mb-4">Alasan Penolakan</h4>
        <textarea id="alasanTolak" rows="3" class="w-full border rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-rose-500" placeholder="Jelaskan alasan tolak..."></textarea>
        <div class="flex justify-end gap-2 mt-4">
            <button onclick="document.getElementById('modalTolak').classList.add('hide')" class="px-4 py-2 bg-slate-100 rounded-xl text-sm font-bold w-full md:w-auto">Batal</button>
            <button onclick="prosesTolak()" class="px-4 py-2 bg-rose-600 text-white rounded-xl text-sm font-bold w-full md:w-auto">Tolak Berkas</button>
        </div>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------
    // WAJIB: GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA!!!
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwTKcKIeh5PM3VHm8fBQjSRm06NiJflI7xg4DNqosajObCCmb3TmizO-zL6XjgYigQN/exec"; 
    // -------------------------------------------------------------

    let state = { role: null, user: null, db: [], pengaturan: {}, selectedRow: 0 };
    let selectedAuth = '';

    // FIX: Core Fetch API Kuat & Anti-CORS Block (Wajib menggunakan headers text/plain)
    async function apiFetch(action, payload = null) {
      let options = { method: 'POST', redirect: 'follow', headers: { "Content-Type": "text/plain;charset=utf-8" } };
      if(payload) options.body = JSON.stringify(payload);
      let url = payload ? `${GAS_URL}?action=${action}` : `${GAS_URL}?action=${action}`; // If GET params needed, format here.
      
      const res = await fetch(url, options);
      return await res.json();
    }

    // FIX: Togle Sidebar Mobile
    function toggleSidebar() {
      const sidebar = document.getElementById('main-sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (sidebar.classList.contains('-translate-x-full')) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
      } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300);
      }
    }

    function bukaFormKredensial(role) {
      selectedAuth = role;
      document.getElementById('role-selection-section').classList.add('hide'); document.getElementById('credential-form-section').classList.remove('hide');
      document.getElementById('label-username').innerText = role === 'Alumni' ? 'NIM Anda' : 'Portal Admin';
      document.getElementById('auth-username').value = ''; document.getElementById('auth-password').value = '';
      if(role === 'Alumni') {
        document.getElementById('auth-password').classList.add('hide'); document.getElementById('auth-password').removeAttribute('required');
      } else {
        document.getElementById('auth-password').classList.remove('hide'); document.getElementById('auth-password').setAttribute('required', 'true');
      }
    }
    function kembaliKePilihanRole() { document.getElementById('credential-form-section').classList.add('hide'); document.getElementById('role-selection-section').classList.remove('hide'); }

    async function prosesLogin(e) {
      e.preventDefault();
      const user = document.getElementById('auth-username').value; const pass = document.getElementById('auth-password').value;
      const btn = document.getElementById('btnLogin'); btn.innerText = "Memverifikasi..."; btn.disabled = true;

      try {
        const url = selectedAuth === 'Alumni' ? `${GAS_URL}?action=loginAlumni&nim=${user}` : `${GAS_URL}?action=loginAdmin&username=${user}&password=${pass}`;
        
        const res = await fetch(url, { method: 'POST', redirect: 'follow', headers: { "Content-Type": "text/plain;charset=utf-8" } });
        const json = await res.json();

        if (json.status === 'success') {
          state.user = json.data; state.role = selectedAuth === 'Alumni' ? 'Alumni' : json.data.role;
          if(json.pengaturan) state.pengaturan = json.pengaturan;
          
          document.getElementById('nav-user-name').innerText = state.user.nama; document.getElementById('nav-user-role').innerText = state.role;
          document.getElementById('nav-initial').innerText = state.user.nama.charAt(0);
          
          buildMenu(); await fetchTableData();
          document.getElementById('login-screen').classList.add('hide'); document.getElementById('app-screen').classList.remove('hide');
          changeView('dashboard');
        } else Swal.fire('Gagal', json.message, 'error');
      } catch(err) { Swal.fire('Error', 'Gagal terhubung ke sistem.', 'error'); }
      btn.innerText = "Masuk"; btn.disabled = false;
    }

    function buildMenu() {
      let nav = `<button onclick="changeView('dashboard')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:bg-slate-800 hover:text-white mb-2"><i class="fas fa-chart-pie w-5"></i> Dashboard</button>`;
      if(state.role === 'Alumni') nav += `<button onclick="changeView('pengajuan')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:bg-slate-800 hover:text-white mb-2"><i class="fas fa-paper-plane w-5"></i> Ajukan Legalisir</button>`;
      nav += `<button onclick="changeView('tabel')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:bg-slate-800 hover:text-white"><i class="fas fa-list-alt w-5"></i> Daftar Data</button>`;
      document.getElementById('nav-menu').innerHTML = nav;
    }

async function changeView(view) {
      if(window.innerWidth < 768) { 
        const sb = document.getElementById('main-sidebar'); 
        if (!sb.classList.contains('-translate-x-full')) toggleSidebar(); 
      }
      
      // FIX: Paksa aplikasi menarik data jika membuka Dashboard ATAU Tabel Data
      if (view === 'dashboard' || view === 'tabel') {
        await fetchTableData(); 
      }

      document.getElementById('view-wrapper').innerHTML = ''; 
      document.getElementById('view-wrapper').appendChild(document.getElementById(`view-${view}`).content.cloneNode(true));

      if (view === 'dashboard') {
        document.getElementById('header-title').innerText = "Dashboard Analitik";
        
        document.getElementById('stat-total').innerText = state.db.length;
        document.getElementById('stat-pending').innerText = state.db.filter(d => String(d.status).toLowerCase().includes('menunggu')).length;
        document.getElementById('stat-done').innerText = state.db.filter(d => d.status === 'Selesai').length;
        document.getElementById('stat-rejected').innerText = state.db.filter(d => d.status === 'Ditolak').length;

        if (state.role === 'Alumni') {
          document.getElementById('profil-alumni').classList.remove('hide');
          document.getElementById('lbl-nim').innerText = state.user.nim; 
          document.getElementById('lbl-nama').innerText = state.user.nama;
          document.getElementById('lbl-prodi').innerText = `${state.user.jurusan} - ${state.user.prodi}`; 
          document.getElementById('lbl-tahun').innerText = state.user.tahunLulus;
        }
      } else if (view === 'pengajuan') {
        document.getElementById('header-title').innerText = "Form Pengajuan";
        document.getElementById('lblBank').innerText = `${state.pengaturan.bank} - ${state.pengaturan.rekening} (A.N. ${state.pengaturan.atasNama})`;
      } else if (view === 'tabel') {
        document.getElementById('header-title').innerText = "Daftar Data"; 
        renderTable();
      }
    }
    
    //async function fetchTableData() {
      //FIX: Menambahkan Header Bypass CORS agar aman di semua browser
      //const res = await fetch(`${GAS_URL}?action=getPengajuan&role=${state.role}&nim=${state.user.nim || ''}`, { method: 'POST', redirect: 'follow', headers: { "Content-Type": "text/plain;charset=utf-8" }});
     //const json = await res.json();
     //if(json.status === 'success') state.db = json.data;
   //}

    async function fetchTableData() {
      try {
        // Menggunakan apiFetch agar data Role dan NIM dikirim terbungkus rapi
        const res = await apiFetch('getPengajuan', { role: state.role, nim: state.user.nim });
        if(res && res.status === 'success') state.db = res.data;
      } catch (e) {
        console.error("Gagal menarik data");
      }
    }
    
    function renderTable() {
      let html = '';
      if(state.db.length === 0) html = `<tr><td colspan="4" class="p-8 text-center text-slate-500 font-bold">Belum ada data pengajuan...</td></tr>`;
      
      state.db.forEach(d => {
        let st = `<span class="bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full text-[10px] font-bold tracking-wide">${d.status}</span>`;
        if(d.status === "Selesai") st = `<span class="bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full text-[10px] font-bold tracking-wide">${d.status}</span>`;
        if(d.status === "Ditolak") st = `<span class="bg-rose-100 text-rose-700 px-2.5 py-1 rounded-full text-[10px] font-bold tracking-wide">${d.status}</span><br><span class="text-[9px] text-rose-500 block mt-1">${d.keterangan || ''}</span>`;
        
        let docs = '';
        if(d.linkIjazah) docs += `<a href="${d.linkIjazah}" target="_blank" class="text-blue-600 hover:underline text-xs block mb-1"><i class="fas fa-image mr-1"></i> Ijazah (${d.jmlIjazah})</a>`;
        if(d.linkTranskrip) docs += `<a href="${d.linkTranskrip}" target="_blank" class="text-blue-600 hover:underline text-xs block mb-1"><i class="fas fa-image mr-1"></i> Transkrip (${d.jmlTranskrip})</a>`;
        if(d.linkBukti) docs += `<a href="${d.linkBukti}" target="_blank" class="text-emerald-600 hover:underline text-xs font-bold block"><i class="fas fa-receipt mr-1"></i> Rp ${d.totalBiaya.toLocaleString('id-ID')}</a>`;

        let btn = `<span class="text-[10px] text-slate-400 italic">-</span>`;
        if (state.role === 'BAAK' && d.status === 'Menunggu BAAK') btn = `<button onclick="actionStatus(${d.rowIndex}, 'Menunggu Keuangan')" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold block w-full mb-1.5 shadow-sm">Kirim ke Keuangan</button><button onclick="openTolak(${d.rowIndex})" class="bg-rose-50 text-rose-600 px-3 py-1.5 rounded-lg text-[10px] font-bold block w-full border border-rose-200">Tolak Berkas</button>`;
        else if (state.role === 'BAAK' && d.status === 'Proses BAAK') btn = `<button onclick="actionStatus(${d.rowIndex}, 'Selesai')" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold block w-full shadow-sm"><i class="fas fa-check mr-1"></i> Tandai Selesai</button>`;
        else if (state.role === 'Keuangan' && d.status === 'Menunggu Keuangan') btn = `<button onclick="actionStatus(${d.rowIndex}, 'Proses BAAK')" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold block w-full mb-1.5 shadow-sm">Valid, Kembalikan ke BAAK</button><button onclick="openTolak(${d.rowIndex})" class="bg-rose-50 text-rose-600 px-3 py-1.5 rounded-lg text-[10px] font-bold block w-full border border-rose-200">Tolak Bukti Bayar</button>`;

        html += `<tr class="border-b hover:bg-slate-50"><td class="p-4"><p class="font-bold text-slate-700 text-sm">${d.nama}</p><p class="text-[10px] text-slate-500 font-mono mt-0.5">${d.nim}</p><p class="text-[10px] text-slate-400 mt-1"><i class="fas fa-truck text-[9px]"></i> ${d.metode}</p></td><td class="p-4">${docs}</td><td class="p-4 text-center">${st}</td><td class="p-4 w-32 md:w-48 text-center align-middle">${btn}</td></tr>`;
      });
      document.getElementById('table-body').innerHTML = html;
    }

    function checkSize(input) { if (input.files[0] && input.files[0].size > 1048576) { Swal.fire('Peringatan', 'Max 1MB', 'warning'); input.value = ''; } }
    function toggleAlamat() { document.getElementById('alamat-container').classList.toggle('hide', document.getElementById('metode').value !== 'Ekspedisi COD'); }
    function hitungTotal() { const t = ((parseInt(document.getElementById('jmlIjazah').value)||0) + (parseInt(document.getElementById('jmlTranskrip').value)||0)) * state.pengaturan.biaya; document.getElementById('lblTotal').innerText = `Rp ${t.toLocaleString('id-ID')}`; return t; }
    const getBase64 = (f) => new Promise((r) => { if(!f) r(null); else { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); } });

    async function submitForm(e) {
      e.preventDefault();
      const jIjazah = parseInt(document.getElementById('jmlIjazah').value)||0; const jTranskrip = parseInt(document.getElementById('jmlTranskrip').value)||0;
      if(jIjazah === 0 && jTranskrip === 0) return Swal.fire('Error', 'Pilih minimal 1 dokumen!', 'error');
      
      const fileBukti = document.getElementById('fileBukti').files[0]; const metode = document.getElementById('metode').value; const alamat = document.getElementById('alamat').value;
      if(metode === 'Ekspedisi COD' && !alamat) return Swal.fire('Error', 'Isi alamat tujuan kirim!', 'error');

      // FIX: Pesan loading dioptimalkan
      Swal.fire({title: 'Mengunggah Data', html: 'Harap tunggu, proses ke server dapat memakan waktu 15 - 30 detik...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
      
      try {
        const payload = { nim: state.user.nim, nama: state.user.nama, prodi: state.user.prodi, noHp: document.getElementById('noHp').value, jmlIjazah: jIjazah, jmlTranskrip: jTranskrip, totalBiaya: hitungTotal(), metode: metode, alamat: alamat, fileIjazah: await getBase64(document.getElementById('fileIjazah').files[0]), fileTranskrip: await getBase64(document.getElementById('fileTranskrip').files[0]), fileBukti: await getBase64(fileBukti) };
        await apiFetch('submit', payload);
        Swal.fire('Sukses', 'Pengajuan berhasil dikirim.', 'success');
        await fetchTableData(); changeView('tabel');
      } catch(e) { Swal.fire('Error', 'Koneksi gagal saat upload', 'error'); }
    }

    // FIX: Semua request WA Admin menggunakan apiFetch (Bypass CORS Aman)
    async function actionStatus(rowIndex, statusBaru) {
      const item = state.db.find(d => d.rowIndex === rowIndex);
      Swal.fire({ title: 'Setujui Berkas?', text: `Notifikasi WA otomatis dikirim ke ${item.nama}`, showCancelButton: true, confirmButtonText: 'Ya, Proses' }).then(async (res) => {
        if(res.isConfirmed) {
          Swal.fire({title: 'Memproses...', html: 'Mengirim notifikasi sistem...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
          try {
            await apiFetch('updateStatus', {rowIndex, statusBaru, noHp: item.noHp, nama: item.nama, metode: item.metode});
            await fetchTableData(); renderTable(); Swal.fire('Terkirim!', 'Status berubah & WA terkirim.', 'success');
          } catch(e) { Swal.fire('Gagal', 'Terjadi kesalahan sistem.', 'error'); }
        }
      });
    }

    function openTolak(rowIndex) { state.selectedRow = rowIndex; document.getElementById('alasanTolak').value = ''; document.getElementById('modalTolak').classList.remove('hide'); }
    async function prosesTolak() {
      const alasan = document.getElementById('alasanTolak').value; if(!alasan) return Swal.fire('Peringatan','Wajib isi alasan!','warning');
      document.getElementById('modalTolak').classList.add('hide');
      Swal.fire({title: 'Menolak Berkas...', html: 'Mengirim notifikasi sistem...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
      
      const item = state.db.find(d => d.rowIndex === state.selectedRow);
      try {
        await apiFetch('updateStatus', {rowIndex: item.rowIndex, statusBaru: 'Ditolak', keteranganTolak: alasan, noHp: item.noHp, nama: item.nama});
        await fetchTableData(); renderTable(); Swal.fire('Ditolak', 'Berkas ditolak & WA terkirim.', 'success');
      } catch(e) { Swal.fire('Gagal', 'Terjadi kesalahan sistem.', 'error'); }
    }
  </script>
</body>
</html>
