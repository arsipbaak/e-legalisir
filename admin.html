<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - E-Legalisir POLTERA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    
    <!-- Bagian Login Admin -->
    <div id="loginSection" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded shadow-lg">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">Login Admin Portal</h2>
        <div class="mb-4">
            <label class="block text-gray-700">Username</label>
            <input type="text" id="username" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700">Password</label>
            <input type="password" id="password" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500">
        </div>
        <button onclick="loginAdmin()" id="btnLogin" class="w-full bg-blue-800 text-white py-2 rounded hover:bg-blue-700">Masuk</button>
    </div>

    <!-- Bagian Dashboard (Sembunyi sebelum login) -->
    <div id="dashboardSection" class="hidden">
        <nav class="bg-blue-800 text-white p-4 flex justify-between items-center shadow">
            <h1 class="text-xl font-bold">Dashboard <span id="lblRole"></span></h1>
            <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-sm hover:bg-red-600">Logout</button>
        </nav>

        <div class="max-w-6xl mx-auto mt-8 px-4">
            <h2 class="text-xl font-semibold mb-4">Daftar Pengajuan Perlu Diproses</h2>
            
            <div class="bg-white rounded shadow overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                        <tr>
                            <th class="px-4 py-3">Data Alumni</th>
                            <th class="px-4 py-3">Order</th>
                            <th class="px-4 py-3">Dokumen Berkas</th>
                            <th class="px-4 py-3">Status Saat Ini</th>
                            <th class="px-4 py-3 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data disisipkan lewat JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Tolak -->
    <div id="modalTolak" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white p-6 rounded shadow-lg w-96">
            <h3 class="text-lg font-bold mb-2">Alasan Penolakan</h3>
            <textarea id="alasanTolak" class="w-full border p-2 mb-4 rounded" rows="3" placeholder="Masukkan alasan kenapa ditolak..."></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">Batal</button>
                <button onclick="prosesTolak()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Kirim Penolakan</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwTKcKIeh5PM3VHm8fBQjSRm06NiJflI7xg4DNqosajObCCmb3TmizO-zL6XjgYigQN/exec"; 
        let adminData = {};
        let selectedRowIndex = 0;
        let selectedUser = {};

        async function loginAdmin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            document.getElementById('btnLogin').innerText = "Verifikasi...";

            const res = await fetch(`${GAS_URL}?action=loginAdmin&username=${user}&password=${pass}`, {
                method: 'POST',
                redirect: 'follow' 
            });
            
            const json = await res.json();
            
            if(json.status === "success") {
                adminData = json.data;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('lblRole').innerText = `Admin ${adminData.role} (${adminData.nama})`;
                loadData();
            } else {
                Swal.fire('Error', json.message, 'error');
            }
            document.getElementById('btnLogin').innerText = "Masuk";
        }

        async function loadData() {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="text-center py-4">Memuat data...</td></tr>';
            
            const res = await fetch(`${GAS_URL}?action=getPengajuan&role=${adminData.role}`, {method: 'POST'});
            const json = await res.json();
            
            let html = '';
            if(json.data.length === 0) {
                html = '<tr><td colspan="5" class="text-center py-4 text-gray-500">Tidak ada pengajuan baru.</td></tr>';
            } else {
                json.data.forEach(item => {
                    // Tentukan tombol aksi berdasarkan Role
                    let btnAksi = '';
                    if(adminData.role === 'BAAK' && item.status === 'Menunggu BAAK') {
                        btnAksi = `
                            <button onclick="updateStatus(${item.rowIndex}, 'Menunggu Keuangan', '${item.nama}', '${item.noHp}')" class="bg-blue-600 text-white px-2 py-1 rounded text-xs block w-full mb-1">Verifikasi Berkas & Kirim ke Keuangan</button>
                            <button onclick="openModalTolak(${item.rowIndex}, '${item.nama}', '${item.noHp}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs block w-full">Tolak Berkas</button>
                        `;
                    } else if (adminData.role === 'Keuangan' && item.status === 'Menunggu Keuangan') {
                        btnAksi = `
                            <button onclick="updateStatus(${item.rowIndex}, 'Proses BAAK', '${item.nama}', '${item.noHp}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs block w-full mb-1">Bukti Valid, Kembalikan ke BAAK</button>
                            <button onclick="openModalTolak(${item.rowIndex}, '${item.nama}', '${item.noHp}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs block w-full">Tolak Bukti Bayar</button>
                        `;
                    } else if (adminData.role === 'BAAK' && item.status === 'Proses BAAK') {
                        btnAksi = `
                            <button onclick="updateStatus(${item.rowIndex}, 'Selesai', '${item.nama}', '${item.noHp}')" class="bg-indigo-600 text-white px-2 py-1 rounded text-xs block w-full">Tandai Selesai & Kirim Notif</button>
                        `;
                    }

                    // Tampilan Dokumen
                    let docHTML = '';
                    if(item.linkIjazah) docHTML += `<a href="${item.linkIjazah}" target="_blank" class="text-blue-500 underline text-xs block">Lihat Ijazah</a>`;
                    if(item.linkTranskrip) docHTML += `<a href="${item.linkTranskrip}" target="_blank" class="text-blue-500 underline text-xs block">Lihat Transkrip</a>`;
                    if(item.linkBukti) docHTML += `<a href="${item.linkBukti}" target="_blank" class="text-green-600 underline text-xs font-bold block mt-1">Bukti Bayar (Rp ${item.totalBiaya.toLocaleString('id-ID')})</a>`;

                    html += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="px-4 py-3">
                                <span class="font-bold">${item.nama}</span><br>
                                <span class="text-xs text-gray-500">${item.nim} | WA: ${item.noHp}</span><br>
                                <span class="text-xs font-semibold bg-gray-200 px-1 rounded">${item.metode}</span>
                            </td>
                            <td class="px-4 py-3 text-xs">
                                Ijazah: ${item.jmlIjazah} lbr<br>
                                Transkrip: ${item.jmlTranskrip} lbr
                            </td>
                            <td class="px-4 py-3">${docHTML}</td>
                            <td class="px-4 py-3">
                                <span class="bg-yellow-100 text-yellow-800 text-xs font-medium px-2 py-0.5 rounded">${item.status}</span>
                            </td>
                            <td class="px-4 py-3 text-center w-48">${btnAksi}</td>
                        </tr>
                    `;
                });
            }
            document.getElementById('tableBody').innerHTML = html;
        }

        async function updateStatus(rowIndex, statusBaru, nama, noHp) {
            Swal.fire({
                title: 'Konfirmasi',
                text: `Yakin ubah status menjadi "${statusBaru}"? Notifikasi WA otomatis akan dikirim ke ${nama}.`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Ya, Lanjutkan'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                    
                    const payload = { rowIndex: rowIndex, statusBaru: statusBaru, noHp: noHp, nama: nama, metode: '' }; // metode ambil dari sheet d backend tp bs d pass jg

                    await fetch(`${GAS_URL}?action=updateStatus`, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    Swal.fire('Berhasil', 'Status diperbarui dan notifikasi WA dikirim.', 'success');
                    loadData(); // Refresh tabel
                }
            });
        }

        function openModalTolak(rowIndex, nama, noHp) {
            selectedRowIndex = rowIndex;
            selectedUser = { nama, noHp };
            document.getElementById('alasanTolak').value = '';
            document.getElementById('modalTolak').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modalTolak').classList.add('hidden');
        }

        async function prosesTolak() {
            const alasan = document.getElementById('alasanTolak').value;
            if(!alasan) return alert('Alasan tolak wajib diisi!');
            
            closeModal();
            Swal.fire({title: 'Memproses Penolakan...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            
            const payload = {
                rowIndex: selectedRowIndex,
                statusBaru: 'Ditolak',
                keteranganTolak: alasan,
                noHp: selectedUser.noHp,
                nama: selectedUser.nama
            };

            await fetch(`${GAS_URL}?action=updateStatus`, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            Swal.fire('Ditolak', 'Pengajuan ditolak dan pesan WA terkirim.', 'success');
            loadData();
        }

        function logout() {
            window.location.reload();
        }
    </script>
</body>
</html>
